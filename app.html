<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaludRural App</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #f0f4f8;
}

.header {
    background-color: #1e3a8a;
    color: white;
    text-align: center;
    padding: 20px;
}

.menu {
    display: flex;
    flex-direction: column;
    padding: 15px;
}

.btn {
    background-color: #2563eb;
    color: white;
    padding: 15px;
    margin: 10px 0;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
    font-size: 18px;
}

.btn:hover {
    background-color: #1e40af;
}
</style>

</head>

<body>

<div class="header">
    <h2>SaludRural</h2>
    <p>App móvil</p>
</div>

<div class="menu">
    <a class="btn" href="#">Servicios</a>
    <a class="btn" href="#">Reservas</a>
    <a class="btn" href="#">Citas</a>
    <a class="btn" href="#">Blog</a>
    <a class="btn" href="#">Contacto</a>
</div>

</body>
</html>
